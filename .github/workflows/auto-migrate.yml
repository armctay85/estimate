name: Auto-Migrate Database

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Database Migration
        run: |
          curl -X POST "https://estimate-seven-rho.vercel.app/api/migrate" \
            -H "Authorization: Bearer ${{ secrets.MIGRATE_SECRET }}" \
            -H "Content-Type: application/json" \
            --retry 3 \
            --retry-delay 5
